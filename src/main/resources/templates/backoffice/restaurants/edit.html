<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${restaurant.name} + ' - Edit Restaurant'">Edit Restaurant - Back Office</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        .header {
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .restaurant-meta {
            background-color: #f9f9f9;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
        }

        .meta-item {
            margin-bottom: 6px;
        }

        .meta-label {
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .required {
            color: #dc3545;
            font-weight: bold;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .form-group.has-error input,
        .form-group.has-error textarea {
            border-color: #dc3545;
        }

        .form-group.has-error input:focus,
        .form-group.has-error textarea:focus {
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.1);
        }

        .form-hint {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        .form-actions-primary {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #007bff;
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
            flex: 0 0 auto;
            padding: 12px 16px;
        }

        .btn-danger:hover {
            background-color: #c82333;
        }

        .help-text {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #007bff;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Edit Restaurant</h1>
            <p>Update restaurant information</p>
        </div>

        <!-- Restaurant Metadata -->
        <div class="restaurant-meta">
            <div class="meta-item"><span class="meta-label">ID:</span> <span th:text="${restaurant.id}"></span></div>
            <div class="meta-item"><span class="meta-label">Created:</span> <span th:text="${#dates.format(restaurant.createdAt, 'MMM dd, yyyy HH:mm')}"></span></div>
            <div class="meta-item" th:if="${restaurant.updatedAt}"><span class="meta-label">Last Updated:</span> <span th:text="${#dates.format(restaurant.updatedAt, 'MMM dd, yyyy HH:mm')}"></span></div>
            <div class="meta-item"><span class="meta-label">Status:</span> <span th:text="${restaurant.isActive ? 'Active' : 'Inactive'}"></span></div>
        </div>

        <!-- Help Text -->
        <div class="help-text">
            <strong>Note:</strong> All fields marked with <span class="required">*</span> are required. Changes will be saved to the database immediately upon submission.
        </div>

        <!-- Form -->
        <form th:action="@{/backoffice/restaurants/{id}(id=${restaurant.id})}" th:object="${restaurant}" method="post">
            <!-- Basic Information -->
            <div class="form-group" th:classappend="${#fields.hasErrors('name') ? 'has-error' : ''}">
                <label for="name">Restaurant Name <span class="required">*</span></label>
                <input type="text" id="name" th:field="*{name}" placeholder="Enter restaurant name" required>
                <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="error-message"></span>
                <span class="form-hint">Must be 2-255 characters</span>
            </div>

            <!-- Contact Information -->
            <div class="form-row">
                <div class="form-group" th:classappend="${#fields.hasErrors('email') ? 'has-error' : ''}">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" th:field="*{email}" placeholder="restaurant@example.com" required>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-message"></span>
                </div>

                <div class="form-group" th:classappend="${#fields.hasErrors('phoneNumber') ? 'has-error' : ''}">
                    <label for="phoneNumber">Phone Number <span class="required">*</span></label>
                    <input type="tel" id="phoneNumber" th:field="*{phoneNumber}" placeholder="(555) 123-4567" required>
                    <span th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="error-message"></span>
                    <span class="form-hint">10-20 characters</span>
                </div>
            </div>

            <!-- Address Information -->
            <div class="form-group" th:classappend="${#fields.hasErrors('street') ? 'has-error' : ''}">
                <label for="street">Street Address <span class="required">*</span></label>
                <input type="text" id="street" th:field="*{street}" placeholder="123 Main Street">
                <span th:if="${#fields.hasErrors('street')}" th:errors="*{street}" class="error-message"></span>
            </div>

            <div class="form-row">
                <div class="form-group" th:classappend="${#fields.hasErrors('city') ? 'has-error' : ''}">
                    <label for="city">City <span class="required">*</span></label>
                    <input type="text" id="city" th:field="*{city}" placeholder="New York">
                    <span th:if="${#fields.hasErrors('city')}" th:errors="*{city}" class="error-message"></span>
                </div>

                <div class="form-group" th:classappend="${#fields.hasErrors('state') ? 'has-error' : ''}">
                    <label for="state">State/Province</label>
                    <input type="text" id="state" th:field="*{state}" placeholder="NY">
                    <span th:if="${#fields.hasErrors('state')}" th:errors="*{state}" class="error-message"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" th:classappend="${#fields.hasErrors('zipCode') ? 'has-error' : ''}">
                    <label for="zipCode">Zip/Postal Code <span class="required">*</span></label>
                    <input type="text" id="zipCode" th:field="*{zipCode}" placeholder="10001">
                    <span th:if="${#fields.hasErrors('zipCode')}" th:errors="*{zipCode}" class="error-message"></span>
                </div>

                <div class="form-group" th:classappend="${#fields.hasErrors('country') ? 'has-error' : ''}">
                    <label for="country">Country <span class="required">*</span></label>
                    <input type="text" id="country" th:field="*{country}" placeholder="United States">
                    <span th:if="${#fields.hasErrors('country')}" th:errors="*{country}" class="error-message"></span>
                </div>
            </div>

            <!-- Description -->
            <div class="form-group" th:classappend="${#fields.hasErrors('description') ? 'has-error' : ''}">
                <label for="description">Description (Optional)</label>
                <textarea id="description" th:field="*{description}" placeholder="Enter a description of the restaurant..."></textarea>
                <span th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="error-message"></span>
                <span class="form-hint">Maximum 500 characters</span>
            </div>

            <!-- Form Actions -->
            <div class="form-actions">
                <div class="form-actions-primary">
                    <a href="/backoffice/restaurants" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Update Restaurant</button>
                </div>
                <a th:href="@{/backoffice/restaurants/{id}/delete(id=${restaurant.id})}" class="btn btn-danger" onclick="return confirm('Are you sure you want to delete this restaurant? This action cannot be undone.');">Delete</a>
            </div>
        </form>
    </div>
</body>
</html>
